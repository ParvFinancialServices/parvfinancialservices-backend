<div style="background:#f3f3f3; font-family:Arial, sans-serif;">
  <div style="max-width:600px; background:white; padding:25px; border-radius:10px; margin:0 auto; box-shadow:0 3px 10px rgba(0,0,0,0.1);">
      
    <h2 style="text-align:center; color:#4CAF50;">🎉 DSA Approval Successful!</h2>

    <p>Hello <strong>{{fullName}}</strong>,</p>

    <p>Your DSA account has been <strong>approved</strong>.  
    You can now log in using the credentials below:</p>

    <div style="background:#f1f1f1; padding:15px; border-radius:8px;">
      <p><strong>Username:</strong> {{username}}</p>
      <p><strong>Password:</strong> {{password}}</p>
    </div>

    <p>Please change your password after the first login.</p>

    <hr style="border:0; border-top:1px solid #ccc; margin:20px 0;">

    <p style="font-size:13px; color:#777; text-align:center;">
      This is an automated email. Please do not reply.
    </p>

  </div>
</div>
